name: GHCR Build and Publish

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/ghcr-publish.yml'
      - '.github/actions/hermes-smoke-test/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'docker/**'
      - '.github/workflows/ghcr-publish.yml'
      - '.github/actions/hermes-smoke-test/**'
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ghcr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/martinezhermes/hermes-agent

jobs:
  docker-smoke:
    name: Build and smoke test amd64 image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build image for smoke test
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:test
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=ghcr-amd64
          cache-to: type=gha,mode=max,scope=ghcr-amd64

      - name: Smoke test image
        uses: ./.github/actions/hermes-smoke-test
        with:
          image: ${{ env.IMAGE_NAME }}:test

  publish:
    name: Publish amd64 image to GHCR
    if: github.repository == 'martinezhermes/hermes-agent' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: docker-smoke
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "created=${created}"

            echo "tags<<EOF"
            echo "${IMAGE_NAME}:${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${IMAGE_NAME}:main"
            fi
            if [ "${GITHUB_EVENT_NAME}" = "release" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"

            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/martinezhermes/hermes-agent"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.created=${created}"
            echo "org.opencontainers.image.title=Hermes Agent"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          build-args: |
            HERMES_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=ghcr-amd64
          cache-to: type=gha,mode=max,scope=ghcr-amd64
          provenance: true
          sbom: true

      - name: Write image manifest artifact
        env:
          IMAGE_CREATED: ${{ steps.image.outputs.created }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_TAGS: ${{ steps.image.outputs.tags }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          image = os.environ["IMAGE_NAME"]
          digest = os.environ["IMAGE_DIGEST"]
          tags = [tag for tag in os.environ["IMAGE_TAGS"].splitlines() if tag]

          manifest = {
              "image": image,
              "digest": digest,
              "immutable_ref": f"{image}@{digest}",
              "source_sha": os.environ["GITHUB_SHA"],
              "source_repository": os.environ["GITHUB_REPOSITORY"],
              "source_ref": os.environ["GITHUB_REF"],
              "created": os.environ["IMAGE_CREATED"],
              "platforms": ["linux/amd64"],
              "tags": tags,
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }

          Path("dist/image-manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Add digest to job summary
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Published image"
            echo
            echo "\`${IMAGE_NAME}@${IMAGE_DIGEST}\`"
            echo
            echo "Digest: \`${IMAGE_DIGEST}\`"
            echo "Source SHA: \`${GITHUB_SHA}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload image manifest artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: image-manifest
          path: dist/image-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Inspect published image
        env:
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: docker buildx imagetools inspect "${IMAGE_NAME}@${IMAGE_DIGEST}"
